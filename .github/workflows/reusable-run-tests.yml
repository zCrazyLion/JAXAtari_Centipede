# .github/workflows/reusable-run-tests.yml
name: Reusable Test Runner

on:
  workflow_call:
    inputs:
      game_matrix:
        description: "A JSON string of the game matrix to test"
        required: true
        type: string
      pr_head_sha:
        description: "The SHA of the PR head"
        required: false
        type: string
      pytest_args:
        description: "Additional pytest args (markers/fixtures/options)"
        required: false
        type: string
        default: ""
      pr_overlay_scope:
        description: "When pr_head_sha is set: games_only or full_repo"
        required: false
        type: string
        default: "games_only"
    outputs:
      test_outcomes:
        description: "JSON object of test outcomes"
        value: ${{ jobs.collect-results.outputs.test_outcome }}

jobs:
  run-tests:
    if: ${{ inputs.game_matrix != '[]' && inputs.game_matrix != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        game: ${{ fromJSON(inputs.game_matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        if: ${{ inputs.pr_head_sha == '' }}

      - name: Check out base branch
        uses: actions/checkout@v6
        if: ${{ inputs.pr_head_sha != '' }}
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Check out PR head
        if: ${{ inputs.pr_head_sha != '' }}
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.pr_head_sha }}
          path: pr_head

      - name: Check out PR head (full repo)
        if: ${{ inputs.pr_head_sha != '' && inputs.pr_overlay_scope == 'full_repo' }}
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.pr_head_sha }}

      - name: Override games with PR changes
        if: ${{ inputs.pr_head_sha != '' && inputs.pr_overlay_scope == 'games_only' }}
        run: |
          rsync -av pr_head/src/jaxatari/games/ src/jaxatari/games/
        shell: bash

      - name: Override full repo with PR changes
        if: ${{ inputs.pr_head_sha != '' && inputs.pr_overlay_scope == 'full_repo' }}
        run: |
          echo "Full-repo overlay is provided by direct checkout of pr_head_sha."
        shell: bash

      - name: Remove PR head sources
        if: ${{ inputs.pr_head_sha != '' }}
        run: |
          rm -rf pr_head
        shell: bash

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Create venv & install package
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -e ".[gh_ci]"
        shell: bash

      - name: Install sprites (CI ownership pre-confirmed)
        run: |
          . .venv/bin/activate
          JAXATARI_CONFIRM_OWNERSHIP=1 install-sprites
        shell: bash

      - name: Run tests
        if: always()
        id: run_tests
        run: |
          set -o pipefail
          echo "Running tests for game: ${{ matrix.game }}"

          . .venv/bin/activate
          free -h

          # Some environments are significantly heavier; reduce xdist pressure to avoid runner instability.
          XDIST_WORKERS=2
          case "${{ matrix.game }}" in
            montezumarevenge|choppercommand)
              XDIST_WORKERS=1
              ;;
          esac
          echo "Using xdist workers: ${XDIST_WORKERS}"

          # 1) Parallel-safe tests with conservative xdist settings.
          /usr/bin/time -v pytest -n "${XDIST_WORKERS}" --dist=loadfile --game ${{ matrix.game }} --snapshot-warn-unused --tb=line -ra --durations=20 --color=yes -m "not serial" ${{ inputs.pytest_args }} tests/ 2>&1 | tee pytest_output_with_color.txt

          # 2) Serial-only tests (if any), run without xdist.
          SERIAL_RC=0
          pytest --collect-only --game ${{ matrix.game }} -m "serial" -q tests/ >/tmp/serial_collect.txt 2>&1 || SERIAL_RC=$?
          if [[ "${SERIAL_RC}" -eq 0 ]]; then
            echo "Running serial tests"
            /usr/bin/time -v pytest --game ${{ matrix.game }} --snapshot-warn-unused --tb=line -ra --durations=20 --color=yes -m "serial" ${{ inputs.pytest_args }} tests/ 2>&1 | tee -a pytest_output_with_color.txt
          elif [[ "${SERIAL_RC}" -eq 5 ]]; then
            echo "No serial tests selected for this matrix entry" | tee -a pytest_output_with_color.txt
          else
            echo "Unexpected error while collecting serial tests (exit ${SERIAL_RC})" | tee -a pytest_output_with_color.txt
            cat /tmp/serial_collect.txt | tee -a pytest_output_with_color.txt
            exit "${SERIAL_RC}"
          fi
          free -h
        shell: bash

      - name: Get pytest output
        if: always() && (github.event.pull_request.head.repo.full_name != github.repository)
        run: |
          # Strip ANSI color codes for the report
          sed -r "s/\x1B\[[0-9;]*[mK]//g" pytest_output_with_color.txt > pytest_output_${{ matrix.game }}.txt
        shell: bash

      - uses: cloudposse/github-action-matrix-outputs-write@v1
        id: out
        if: always() && (github.event.pull_request.head.repo.full_name != github.repository)
        with:
          matrix-step-name: ${{ github.job }}
          matrix-key: ${{ matrix.game }}
          outputs: |-
            test_outcome: ${{ steps.run_tests.outcome }}

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-report-${{ matrix.game }}
          path: pytest_output_${{ matrix.game }}.txt
          retention-days: 1

  collect-results:
    needs: run-tests
    if: always() && (github.event.pull_request.head.repo.full_name != github.repository)
    runs-on: ubuntu-latest
    outputs:
      test_outcome: ${{ steps.set_outputs.outputs.test_outcomes }}
    steps:
      - uses: cloudposse/github-action-matrix-outputs-read@v1
        id: read
        with:
          matrix-step-name: run-tests

      - id: set_outputs
        run: |
          result='${{ steps.read.outputs.result }}'
          test_outcomes=$(echo "$result" | jq -c .test_outcome)
          echo "test_outcomes=$test_outcomes" >> $GITHUB_OUTPUT
        shell: bash
