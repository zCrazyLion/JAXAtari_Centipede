# This is adapted from Atari configuration 
ALG_NAME: "pqn"
TOTAL_TIMESTEPS: 1e8 # 1e8 == 100M, but times 4 (frame-skipping) -> pqn paper: enough to outperform Rainbow
TOTAL_TIMESTEPS_DECAY: 1e8 # will be used for decay functions, in case you want to test for less timesteps and keep decays same
NUM_ENVS: 2048 # parallel environments
NUM_STEPS: 32 # steps per environment in each update
EPS_START: 1.0
EPS_FINISH: 0.001
EPS_DECAY: 0.1
NUM_EPOCHS: 2
NUM_MINIBATCHES: 16 # minibatches per epoch
NORM_TYPE: "layer_norm" # layer_norm or batch_norm
LR: 1e-3
# LR: 2.5e-4
MAX_GRAD_NORM: 10
LR_LINEAR_DECAY: False 
GAMMA: 0.99
LAMBDA: 0.65

# env specific
ENV_NAME: "Pong"
ENV_KWARGS: {}
OBJECT_CENTRIC: False
PIXEL_GRAYSCALE: True
PIXEL_RESIZE: True
PIXEL_RESIZE_SHAPE: [84, 84]
USE_NATIVE_DOWNSCALING: True
# Apply these mods during evaluation
# Activate only for eval runs (or debugging)
# Set TRAIN_MODS: null to train on base env.
TRAIN_MODS: null
EVAL_MODS: null 

# Note: This will massively increase compile and run time!
# Turn off for final reported training run.
TEST_DURING_TRAINING: False
TEST_INTERVAL: 0.1 # in terms of total updates
TEST_NUM_ENVS: 128
TEST_NUM_STEPS: 10000
EPS_TEST: 0.0 # 0 for greedy policy
RECORD_VIDEO: True

# Generate a final video at the end of training
RECORD_FINAL_VIDEO: True
VIDEO_MAX_STEPS: 1000