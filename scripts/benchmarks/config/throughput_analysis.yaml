GAME_NAMES: ["Frostbite"]
# For multi-env benchmarking, use only names and keep env IDs unset.
BENCHMARK_BACKENDS: ["jaxatari"] #, "gym_ale", "ale_vectorenv"]
# BENCHMARK_BACKENDS: ["ale_vectorenv"]
GYM_ALE_TIMEOUT_S: 1200 # stop after 20min

# ALE_VECTORENV_ASYNC_STEPPING: [false, true]
ALE_VECTORENV_ASYNC_STEPPING: [true]
# If null, defaults to a power-of-two in the 80-100% band when available, else num_envs.
ALE_VECTORENV_BATCH_SIZE: null
ALE_VECTORENV_THREAD_AFFINITY_OFFSET: null

JAXATARI_MODES: ["oc", "pixel"]
# JAXATARI_MODES: ["oc"]
# Pixel benchmark uses the exact wrapper/downscaling combo below.
JAXATARI_PIXEL_OPTIONS: ["resized", "grayscale", "native"]
JAXATARI_PIXEL_TRY_ALL_COMBINATIONS: false
JAXATARI_PIXEL_OPTION_COMBINATIONS:
  # - [] # just default
  # - ["resized"]
  # - ["resized", "native"]
  - ["resized", "native", "grayscale"]
# Run both JAX platforms for JAXAtari modes.
JAXATARI_PLATFORMS: ["gpu"]
# JAXATARI_PLATFORMS: ["cpu"]
ATARI_FRAME_SKIP: [4] #[1, 4]
PIXEL_RESIZE_SHAPE: [84, 84]

SAVE_RESULTS_CSV: true
RESULTS_CSV_PATH: "./outputs/throughput_results_jaxatari_new_frostbite.csv"

SEED: 0

ENV_COUNTS: [1,8,32,64,128,256,512,1024,2048,4096,8192,16384, 32768, 65536]
NUM_STEPS: 2000 # n_steps per env

GIVEN_ACTION: 0

WANDB_MODE: "offline"
ENTITY: ""
PROJECT: "jaxatari-throughput"
RUN_NAME: "throughput_analysis"
TAGS: ["benchmark", "throughput", "jaxatari"]
NOTES: ""
