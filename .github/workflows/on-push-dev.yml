name: Dev Push Tests

on:
  push:
    branches:
      - dev

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      pytest_args: ${{ steps.set-matrix.outputs.pytest_args }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate matrix
        id: set-matrix
        run: |
          CHANGED_FILES=$(git diff --name-only "${{ github.event.before }}"...${{ github.sha }})

          CORE_INFRA_CHANGED=$(echo "$CHANGED_FILES" | sed '/^$/d' | awk '
            /^src\/jaxatari\/core\.py$/ {print; next}
            /^src\/jaxatari\/modification\.py$/ {print; next}
            /^src\/jaxatari\/spaces\.py$/ {print; next}
            /^src\/jaxatari\/gym_wrapper\.py$/ {print; next}
            /^src\/jaxatari\/renderers\/rendering_utils\.py$/ {print; next}
            /^src\/jaxatari\/wrappers\// {print; next}
          ')

          CHANGED_GAME_FILES=$(echo "$CHANGED_FILES" | awk '/^src\/jaxatari\/games\/jax_.*\.py$/ {print}')
          if [[ -n "$CHANGED_GAME_FILES" ]]; then
            CHANGED_GAME_MATRIX=$(echo "$CHANGED_GAME_FILES" | sed -e 's|src/jaxatari/games/jax_||' | sed -e 's|\.py||' | jq -R . | jq -cs .)
          else
            CHANGED_GAME_MATRIX="[]"
          fi

          if [[ -n "$CORE_INFRA_CHANGED" ]]; then
            echo "Core infrastructure changed on dev. Running Core-5 plus any touched game env tests."
            CORE_FIVE='["seaquest","kangaroo","montezumarevenge","pong","phoenix"]'
            CHANGED_GAMES=$(jq -cn --argjson a "$CORE_FIVE" --argjson b "$CHANGED_GAME_MATRIX" '$a + $b | unique')
            PYTEST_ARGS='--integration --wrapper-full'
          else
            echo "Running targeted smoke lane for changed games on dev."
            CHANGED_GAMES="$CHANGED_GAME_MATRIX"
            PYTEST_ARGS=''
          fi

          echo "matrix=$CHANGED_GAMES" >> "$GITHUB_OUTPUT"
          echo "pytest_args=$PYTEST_ARGS" >> "$GITHUB_OUTPUT"
        shell: bash

  trigger:
    needs: prepare-matrix
    uses: ./.github/workflows/reusable-run-tests.yml
    with:
      game_matrix: ${{ needs.prepare-matrix.outputs.matrix }}
      pytest_args: ${{ needs.prepare-matrix.outputs.pytest_args }}
